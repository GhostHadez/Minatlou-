<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Careers | Minatlou Security & Projects</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/base.css"/>
<link rel="stylesheet" href="css/pages.css"/>
</head>
<body>

<div id="site-navbar"></div>

<main class="page-content">
  <div class="page-header">
    <div class="container">
      <div class="section-label">Join Our Team</div>
      <h1 class="section-title">Current <span>Openings</span></h1>
      <p>Build your career with a trusted, PSIRA-registered security company serving government, corporate, and private clients across the North West Province.</p>
    </div>
  </div>

  <div class="section" style="padding-top:0;">
    <div class="container">
      <!-- Search + Filter -->
      <form class="filter-bar reveal" id="filterForm" onsubmit="return false;">
        <div class="filter-group">
          <label for="searchInput">Search Jobs</label>
          <input type="text" id="searchInput" placeholder="Job title or keyword"/>
        </div>
        <div class="filter-group">
          <label for="locationInput">Location</label>
          <select id="locationInput">
            <option value="">All Locations</option>
            <option value="Mmabatho">Mmabatho</option>
            <option value="Mahikeng">Mahikeng</option>
            <option value="North West">North West (Other)</option>
            <option value="Remote">Remote</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="typeInput">Employment Type</label>
          <select id="typeInput">
            <option value="">All Types</option>
            <option value="Full-Time">Full-Time</option>
            <option value="Part-Time">Part-Time</option>
            <option value="Contract">Contract</option>
            <option value="Temporary">Temporary</option>
          </select>
        </div>
        <button type="button" class="btn btn-primary" onclick="applyFilters()">Search</button>
      </form>

      <div class="results-meta">
        <span id="resultsCount">Loading jobs…</span>
        <button type="button" class="btn btn-outline" style="padding:0.5rem 1.2rem; font-size:0.75rem;" onclick="resetFilters()">Clear Filters</button>
      </div>

      <div id="jobsContainer" class="jobs-grid"></div>
    </div>
  </div>
</main>

<div id="site-footer"></div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/partials.js"></script>
<script src="js/job-card.js"></script>
<script src="js/nav.js"></script>
<script>
/**
 * Careers page controller.
 * Pulls jobs from GET /api/jobs (via JobsAPI.list) and renders
 * job-card.js templates. Falls back to sample data only when the
 * backend is not yet connected, so the UI is fully demonstrable
 * before go-live — remove FALLBACK_JOBS once the API is live.
 */
const FALLBACK_JOBS = [
  { id: 'sg-001', title: 'Security Guard — Grade C', location: 'Mmabatho', type: 'Full-Time', department: 'Physical Security', description: 'PSIRA-registered guards needed for commercial site patrols and access control across Mmabatho.', postedAt: new Date(Date.now() - 2 * 86400000).toISOString() },
  { id: 'es-002', title: 'Event Security Supervisor', location: 'Mahikeng', type: 'Contract', department: 'Event Security', description: 'Lead crowd management teams at sporting and community events across the North West Province.', postedAt: new Date(Date.now() - 6 * 86400000).toISOString() },
  { id: 'vp-003', title: 'VIP Close Protection Officer', location: 'Mmabatho', type: 'Full-Time', department: 'VIP Protection', description: 'Experienced close protection officer required for executive and dignitary protection assignments.', postedAt: new Date(Date.now() - 12 * 86400000).toISOString() },
  { id: 'cctv-004', title: 'CCTV Installation Technician', location: 'North West', type: 'Full-Time', department: 'Technical', description: 'Install and configure CCTV systems for commercial and residential clients across the region.', postedAt: new Date(Date.now() - 20 * 86400000).toISOString() },
  { id: 'dr-005', title: 'Armed Response Driver', location: 'Mmabatho', type: 'Full-Time', department: 'Patrol & Response', description: 'Respond to alarm activations and conduct branded vehicle patrols throughout Mmabatho.', postedAt: new Date(Date.now() - 30 * 86400000).toISOString() },
];

let allJobs = [];

async function loadJobs() {
  const container = document.getElementById('jobsContainer');
  container.innerHTML = '<div class="spinner"></div>';

  try {
    const data = await ApiService.JobsAPI.list();
    allJobs = (data && data.jobs) || data || [];
    if (!Array.isArray(allJobs) || !allJobs.length) throw new Error('empty');
  } catch (err) {
    // Backend not connected yet — use fallback sample data so the
    // UI remains demonstrable. Safe to delete this catch block
    // (and FALLBACK_JOBS above) once /api/jobs is live.
    allJobs = FALLBACK_JOBS;
  }

  renderJobs(allJobs);
}

function renderJobs(jobs) {
  const container = document.getElementById('jobsContainer');
  const count = document.getElementById('resultsCount');

  if (!jobs.length) {
    container.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1;">
        <div class="ic">🔍</div>
        <p>No job openings match your search right now.</p>
      </div>`;
    count.textContent = 'No openings found';
    return;
  }

  count.innerHTML = `<strong>${jobs.length}</strong> opening${jobs.length !== 1 ? 's' : ''} found`;
  container.innerHTML = jobs.map(renderJobCard).join('');
  if (window.triggerReveals) triggerReveals();
}

function applyFilters() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const location = document.getElementById('locationInput').value;
  const type = document.getElementById('typeInput').value;

  const filtered = allJobs.filter((job) => {
    const matchesSearch = !search ||
      job.title.toLowerCase().includes(search) ||
      (job.description || '').toLowerCase().includes(search);
    const matchesLocation = !location || job.location === location;
    const matchesType = !type || job.type === type;
    return matchesSearch && matchesLocation && matchesType;
  });

  renderJobs(filtered);
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('locationInput').value = '';
  document.getElementById('typeInput').value = '';
  renderJobs(allJobs);
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('locationInput').addEventListener('change', applyFilters);
document.getElementById('typeInput').addEventListener('change', applyFilters);

loadJobs();
</script>
</body>
</html>
