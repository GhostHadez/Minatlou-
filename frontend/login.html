<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In | Minatlou Security & Projects</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/base.css"/>
<link rel="stylesheet" href="css/pages.css"/>
</head>
<body>

<div id="site-navbar"></div>

<main class="page-content">
  <div class="auth-wrap">
    <div class="auth-box reveal">
      <img class="auth-logo" src="assets/img/logo.png" alt="Minatlou Logo"/>
      <h1>Sign <span>In</span></h1>
      <p class="auth-sub">Access your applicant dashboard</p>

      <div class="form-error" id="formError"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="your@email.com" autocomplete="username" required/>
          <div class="field-error" id="emailError"></div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
          <div class="field-error" id="passwordError"></div>
        </div>
        <div class="auth-forgot">
          <a href="forgot-password.html">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary" id="loginSubmitBtn">Sign In</button>
      </form>

      <div class="auth-links">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
    </div>
  </div>
</main>

<div id="site-footer"></div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/partials.js"></script>
<script src="js/nav.js"></script>
<script>
/**
 * Login controller — POST /api/auth/login
 * On success, stores { token, user } via Auth.setSession and
 * redirects to ?next=<page> if present, else the dashboard.
 */
if (Auth.isLoggedIn()) {
  window.location.href = 'dashboard.html';
}

const form = document.getElementById('loginForm');
const submitBtn = document.getElementById('loginSubmitBtn');
const formError = document.getElementById('formError');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearFieldErrors(['email', 'password']);
  formError.classList.remove('show');

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  let hasError = false;
  if (!isValidEmail(email)) {
    setFieldError('email', 'Enter a valid email address');
    hasError = true;
  }
  if (!password) {
    setFieldError('password', 'Password is required');
    hasError = true;
  }
  if (hasError) return;

  setButtonLoading(submitBtn, true, 'Signing in…');
  try {
    const data = await ApiService.AuthAPI.login({ email, password });
    Auth.setSession(data.token, data.user);
    showToast('Welcome back!');
    const next = new URLSearchParams(window.location.search).get('next');
    window.location.href = next ? decodeURIComponent(next) : 'dashboard.html';
  } catch (err) {
    formError.textContent = err.status === 401
      ? 'Incorrect email or password. Please try again.'
      : (err.message || 'Something went wrong. Please try again.');
    formError.classList.add('show');
  } finally {
    setButtonLoading(submitBtn, false);
  }
});
</script>
</body>
</html>
