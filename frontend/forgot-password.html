<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot Password | Minatlou Security & Projects</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/base.css"/>
<link rel="stylesheet" href="css/pages.css"/>
</head>
<body>

<div id="site-navbar"></div>

<main class="page-content">
  <div class="auth-wrap">
    <div class="auth-box reveal" id="requestBox">
      <img class="auth-logo" src="assets/img/logo.png" alt="Minatlou Logo"/>
      <h1>Reset <span>Password</span></h1>
      <p class="auth-sub">Enter your email and we'll send you a reset link</p>

      <div class="form-error" id="formError"></div>

      <form id="forgotForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="your@email.com" autocomplete="username" required/>
          <div class="field-error" id="emailError"></div>
        </div>
        <button type="submit" class="btn btn-primary" id="forgotSubmitBtn">Send Reset Link</button>
      </form>

      <div class="auth-links">
        <a href="login.html">← Back to Sign In</a>
      </div>
    </div>

    <div class="auth-box reveal" id="successBox" style="display:none; text-align:center;">
      <div style="font-size:2.5rem; margin-bottom:1rem;">✅</div>
      <h1 style="font-size:1.4rem;">Check Your Email</h1>
      <p class="auth-sub" style="margin-bottom:0;">If an account exists for that address, a password reset link is on its way.</p>
      <div class="auth-links">
        <a href="login.html">← Back to Sign In</a>
      </div>
    </div>
  </div>
</main>

<div id="site-footer"></div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/partials.js"></script>
<script src="js/nav.js"></script>
<script>
const form = document.getElementById('forgotForm');
const submitBtn = document.getElementById('forgotSubmitBtn');
const formError = document.getElementById('formError');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearFieldErrors(['email']);
  formError.classList.remove('show');

  const email = document.getElementById('email').value.trim();
  if (!isValidEmail(email)) {
    setFieldError('email', 'Enter a valid email address');
    return;
  }

  setButtonLoading(submitBtn, true, 'Sending…');
  try {
    await ApiService.AuthAPI.forgotPassword({ email });
  } catch (err) {
    // Intentionally show the success state regardless of whether
    // the email exists, to avoid leaking account existence.
  } finally {
    setButtonLoading(submitBtn, false);
    document.getElementById('requestBox').style.display = 'none';
    document.getElementById('successBox').style.display = 'block';
  }
});
</script>
</body>
</html>
